<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カードコレクション</title>
  <style>
    * { box-sizing: border-box; }

    /* =========================================
       1. 全体レイアウト
       ========================================= */
    :root { font-size: 16px; }
    body {
      margin: 0; background-color: #000; display: flex;
      justify-content: center; align-items: center;
      height: 100dvh; font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #e2e8f0; overflow: hidden;
    }
    #app {
      width: 100%; height: 100%; max-width: 480px; 
      background-color: #0d1117; position: relative;
      display: flex; flex-direction: column; 
    }
    .view {
      flex: 1; display: none; flex-direction: column;
      overflow-y: auto; overflow-x: hidden; padding: 12px;
    }
    .view.active { display: flex; }
    h2 {
      text-align: center; font-weight: 300; letter-spacing: 0.2rem;
      font-size: 1.2rem; margin: 1rem 0; flex-shrink: 0;
    }

    /* =========================================
       8. ローディング画面（新規追加）
       ========================================= */
    #loading-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #0d1117; z-index: 999; display: flex;
      flex-direction: column; justify-content: center; align-items: center;
    }
    #loading-text { font-size: 1.2rem; letter-spacing: 0.2rem; margin-bottom: 1rem; font-weight: bold; color: #fbbf24; }
    #loading-bar-container {
      width: 60%; height: 8px; background-color: #334155; border-radius: 4px; overflow: hidden;
    }
    #loading-bar { width: 0%; height: 100%; background-color: #fbbf24; transition: width 0.2s ease-out; }

    /* =========================================
       2. 下部ナビゲーション
       ========================================= */
    .bottom-nav {
      height: 4rem; background-color: #1e293b; display: flex;
      border-top: 1px solid #334155; flex-shrink: 0; z-index: 50;
    }
    .nav-btn {
      flex: 1; display: flex; justify-content: center; align-items: center;
      color: #94a3b8; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background-color 0.2s;
    }
    .nav-btn.active { color: #fbbf24; background-color: #334155; border-bottom: 0.2rem solid #fbbf24; }

    /* =========================================
       3. ガチャ画面
       ========================================= */
    .banner-list { display: flex; flex-direction: column; gap: 1.5rem; }
    .gacha-banner {
      width: 100%; aspect-ratio: 3 / 1; border-radius: 0.8rem;
      background-color: #334155; background-size: cover; background-position: center;
      border: 0.15rem solid #64748b; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.5);
      cursor: pointer; overflow: hidden;
    }
    .gacha-banner:active { transform: scale(0.97); }

    .pull-actions { display: flex; justify-content: space-around; margin-top: 2rem; gap: 1rem; }
    .btn-pull {
      flex: 1; padding: 1rem 0; border-radius: 0.5rem; font-size: 1.1rem;
      font-weight: bold; text-align: center; cursor: pointer;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: 0.1rem solid #60a5fa; color: white; box-shadow: 0 0.4rem 0.8rem rgba(0,0,0,0.4);
    }
    .btn-pull-5 { background: linear-gradient(135deg, #f59e0b, #d97706); border-color: #fbbf24; }
    .btn-pull:active { transform: translateY(0.2rem); }
    .result-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 1rem; }
    .result-grid .card-wrapper { width: 25vw; max-width: 80px; }
    .back-btn {
      margin-top: 3rem; padding: 0.8rem; text-align: center; background-color: #475569; border-radius: 0.5rem; cursor: pointer;
    }

    /* =========================================
       4. 図鑑画面
       ========================================= */
    .pokedex-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding-bottom: 2rem; }

    /* =========================================
       5. カードのデザイン
       ========================================= */
    .card-wrapper {
      position: relative; width: 100%; aspect-ratio: 1 / 1; border-radius: 0.5rem; padding: 0.15rem; 
      background: linear-gradient(135deg, #64748b, #334155); box-shadow: 0 0.4rem 0.8rem rgba(0,0,0,0.5); cursor: pointer;
    }
    .card-image {
      width: 100%; height: 100%; border-radius: 0.35rem; background-size: 500% 100%; position: relative; overflow: hidden; background-color: #1e293b;
    }
    .card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; height: 40%; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    }

    .is-unowned .card-image { filter: grayscale(100%) brightness(0.25); }
    .is-unowned .card-wrapper { background: #0f172a; border: 1px solid #1e293b; box-shadow: none; cursor: default; }
    .is-unowned .rarity-diamonds, .is-unowned .attr-badge, .is-unowned .card-overlay { display: none; }

    .is-star4 { box-shadow: 0 0 0.8rem rgba(255, 215, 0, 0.4); }
    .is-star4 .card-image::after {
      content: ''; position: absolute; top: -100%; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0) 100%);
      animation: shineDown 3s infinite; pointer-events: none; z-index: 5;
    }
    @keyframes shineDown { 0%, 20% { top: -100%; } 80%, 100% { top: 100%; } }

    .is-star5 { border: 3px solid #fff; box-shadow: 0 0 1rem rgba(255, 215, 0, 0.4), inset 0 0 0.5rem rgba(255, 255, 255, 0.3); }
    .is-star5 .card-image::after {
      content: ''; position: absolute; top: -150%; right: -150%; width: 300%; height: 300%;
      background: linear-gradient(
        to left bottom, rgba(255, 255, 255, 0) 42%, rgba(255, 100, 100, 0.8) 46%, 
        rgba(255, 255, 100, 0.8) 48%, rgba(100, 255, 100, 0.8) 50%, 
        rgba(100, 200, 255, 0.8) 52%, rgba(200, 100, 255, 0.8) 54%, rgba(255, 255, 255, 0) 58%
      );
      background-size: 200% 200%; mix-blend-mode: color-dodge; 
      animation: diagonalShine 3s ease-in-out infinite; pointer-events: none; z-index: 5;
    }
    @keyframes diagonalShine { 0% { background-position: 100% 0%; opacity: 0; } 20% { background-position: 100% 0%; opacity: 1; } 80% { background-position: 0% 100%; opacity: 1; } 100% { background-position: 0% 100%; opacity: 0; } }

    .rarity-diamonds { position: absolute; bottom: 4px; left: 4px; display: flex; align-items: center; z-index: 10; }
    .diamond { width: 10px; height: 10px; transform: rotate(45deg); border: 1px solid rgba(255, 255, 255, 0.7); margin-left: -4px; }
    .diamond:first-child { margin-left: 0; }
    .diamond-silver { background: linear-gradient(135deg, #e2e8f0, #94a3b8); } 
    .diamond-gold { background: linear-gradient(135deg, #fef08a, #eab308); border-color: #fff; } 
    .diamond-rainbow { background: linear-gradient(135deg, #f87171, #facc15, #4ade80, #60a5fa, #c084fc); background-size: 200% 200%; animation: mysticGlow 3s ease infinite; border-color: #fff; }
    
    .attr-badge { position: absolute; bottom: 3px; right: 3px; width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.8); z-index: 10; }
    .attr-黄 { background: linear-gradient(135deg, #fde047, #ca8a04); }
    .attr-桃 { background: linear-gradient(135deg, #f9a8d4, #db2777); }
    .attr-紫 { background: linear-gradient(135deg, #d8b4fe, #9333ea); }

    /* =========================================
       6. モーダル（詳細画面）
       ========================================= */
    #modal-overlay, #confirm-modal-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(0.3rem);
    }
    #modal-content { background: #1e293b; border-radius: 1rem; width: 80%; padding: 1.5rem; border: 0.1rem solid #334155; position: relative; }
    .modal-close { position: absolute; top: 0.5rem; right: 1rem; font-size: 1.5rem; color: #94a3b8; cursor: pointer; z-index: 110; }
    #modal-image-wrapper { width: 100%; max-width: 150px; aspect-ratio: 1 / 1; margin: 0 auto 1rem; border-radius: 0.5rem; padding: 0.15rem; background: linear-gradient(135deg, #64748b, #334155); position: relative; cursor: default; }
    #modal-image-box { width: 100%; height: 100%; border-radius: 0.35rem; background-size: 500% 100%; position: relative; overflow: hidden; background-color: #1e293b; }
    #modal-name { text-align: center; margin: 0 0 0.5rem 0; font-size: 1.2rem; }
    #modal-info { text-align: center; color: #fbbf24; font-size: 0.9rem; margin-bottom: 1rem; }

    @keyframes mysticGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    /* =========================================
       7. ガチャ演出（フリップ・昇格）
       ========================================= */
    .result-grid { perspective: 1000px; }
    .card-wrapper.in-gacha { background: transparent; box-shadow: none; border: none; padding: 0; cursor: pointer; }
    .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-wrapper.flip-star4 .card-inner { transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .card-wrapper.flip-star5 .card-inner { transition: transform 2.5s ease-in-out; }
    .card-wrapper.is-flipped .card-inner { transform: rotateY(180deg); }

    .card-front, .card-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 0.5rem; }
    .card-front { transform: rotateY(180deg); padding: 0.15rem; background: linear-gradient(135deg, #64748b, #334155); box-shadow: 0 0.4rem 0.8rem rgba(0,0,0,0.5); }
    .is-star4 .card-front { box-shadow: 0 0 0.8rem rgba(255, 215, 0, 0.4); }
    .is-star5 .card-front { border: 3px solid #fff; box-shadow: 0 0 1rem rgba(255, 215, 0, 0.4), inset 0 0 0.5rem rgba(255, 255, 255, 0.3); }

    .card-back { background: linear-gradient(135deg, #475569, #1e293b); border: 2px solid #94a3b8; display: flex; justify-content: center; align-items: center; }
    .card-back::after { content: '？'; font-size: 2rem; color: #94a3b8; font-weight: bold; }
    .card-back.back-star4 { border-color: #fbbf24; background: linear-gradient(135deg, #b45309, #78350f); }
    .card-back.back-star4::after { color: #fbbf24; }
    .card-back.back-star5 { border-color: #fca5a5; background: linear-gradient(135deg, #4c1d95, #1e1b4b); }
    .card-back.back-star5::after { color: #fca5a5; }

    @keyframes fakeoutShake {
      0%, 100% { transform: translateX(0) scale(1); filter: brightness(1); }
      10%, 30%, 50%, 70% { transform: translateX(-5px) scale(1.05); }
      20%, 40%, 60%, 80% { transform: translateX(5px) scale(1.05); }
      90% { transform: scale(1.1); filter: brightness(2); }
    }
    .card-wrapper.is-fakeout.is-flipped { animation: fakeoutShake 1.5s forwards; }
    .card-wrapper.is-fakeout.is-flipped .card-inner { transition: transform 0.5s ease-out !important; transition-delay: 1.5s !important; transform: rotateY(180deg); }
  </style>
</head>
<body>

  <div id="app">
    <div id="loading-screen">
      <div id="loading-text">NOW LOADING...</div>
      <div id="loading-bar-container">
        <div id="loading-bar"></div>
      </div>
    </div>

    <div id="view-gacha" class="view active">
      <h2>GACHA</h2>
      <div id="gacha-banners" class="banner-list"></div>
    </div>

    <div id="view-gacha-pull" class="view">
      <div id="pull-banner-preview" class="gacha-banner" style="cursor: default; margin-top: 1rem;"></div>
      <div class="pull-actions">
        <div class="btn-pull" onclick="confirmGacha(1)">1回 引く</div>
        <div class="btn-pull btn-pull-5" onclick="confirmGacha(5)">5回 引く</div>
      </div>
      <div class="back-btn" onclick="switchView('view-gacha')">一覧へ戻る</div>
    </div>

    <div id="view-gacha-result" class="view">
      <h2>RESULT</h2>
      <div id="gacha-result-container" class="result-grid"></div>
      <div id="result-action-buttons" style="display: flex; gap: 1rem; margin-top: 3rem; opacity: 0.3; pointer-events: none; transition: opacity 0.5s;">
        <div class="back-btn" style="flex: 1; margin-top: 0;" onclick="switchView('view-gacha')">戻る</div>
        <div class="back-btn" style="flex: 1; margin-top: 0; background-color: #2563eb; color: white;" onclick="confirmGacha(pendingGachaTimes)">もう一度引く</div>
      </div>
    </div>

    <div id="view-pokedex" class="view">
      <h2>POKEDEX</h2>
      <div id="pokedex-container" class="pokedex-grid"></div>
    </div>

    <div class="bottom-nav">
      <div id="tab-gacha" class="nav-btn active" onclick="switchTab('gacha')">ガチャ</div>
      <div id="tab-pokedex" class="nav-btn" onclick="switchTab('pokedex')">図鑑</div>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
      <div id="modal-content" onclick="event.stopPropagation()">
        <div class="modal-close" onclick="closeModal()">×</div>
        <div id="modal-image-wrapper"><div id="modal-image-box" class="card-image"></div></div>
        <h3 id="modal-name">キャラクター名</h3>
        <div id="modal-info">属性 / ジャンル</div>
      </div>
    </div>

    <div id="confirm-modal-overlay" onclick="closeConfirmModal()">
      <div style="background: #1e293b; border-radius: 1rem; width: 80%; max-width: 320px; padding: 1.5rem; border: 0.1rem solid #334155; text-align: center;" onclick="event.stopPropagation()">
        <h3 style="margin-top: 0; font-size: 1.2rem;">確認</h3>
        <p id="confirm-text" style="color: #e2e8f0; margin-bottom: 2rem;">ガチャを引きますか？</p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
          <div class="btn-pull" style="flex: 1; padding: 0.8rem 0; background: #475569; border-color: #64748b;" onclick="closeConfirmModal()">キャンセル</div>
          <div class="btn-pull" style="flex: 1; padding: 0.8rem 0;" onclick="proceedGacha()">引く</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const rawData = `
001.png 黄 コンサート ニコニコ・ニコリ
002.png 紫 コンサート 白髪G
003.png 桃 コンサート デブG
004.png 紫 日常 ニコニコ・ニコリ
005.png 桃 日常 白髪G
006.png 黄 日常 デブG
007.png 桃 花見 ニコニコ・ニコリ
008.png 桃 花見 白髪G
009.png 桃 花見 デブG
010.png 桃 ホワイトデー ニコニコ・ニコリ
011.png 紫 ホワイトデー デブG
    `;

    class Card {
      constructor(id, rarity, genre, name, attribute, imageUrl) {
        this.id = id; this.rarity = rarity; this.genre = genre;
        this.name = name; this.attribute = attribute; this.imageUrl = imageUrl;
      }
    }

    const allCards = [];
    rawData.trim().split('\n').forEach(line => {
      const parts = line.trim().split(/\s+/);
      if (parts.length >= 4) {
        const fileName = parts[0]; const attribute = parts[1];
        const genre = parts[2]; const name = parts[3];
        const baseId = fileName.split('.')[0];
        const imageUrl = `./public/image/card/${fileName}`;
        for (let rarity = 1; rarity <= 5; rarity++) {
          allCards.push(new Card(`${baseId}-${rarity}`, rarity, genre, name, attribute, imageUrl));
        }
      }
    });

    const gachaData = [
      { id: 'normal', name: 'ノーマルガチャ', image: '001.png', genres: ['コンサート', '日常'] },
      { id: 'hanami', name: 'お花見ガチャ', image: '002.png', genres: ['花見'] },
      { id: 'whiteday', name: 'ホワイトデーガチャ', image: '003.png', genres: ['ホワイトデー'] }
    ];

    let currentGacha = null;
    const ownedCardIds = new Set();
    let pendingGachaTimes = 1;

    function switchView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');

      const bottomNav = document.querySelector('.bottom-nav');
      if (viewId === 'view-gacha-pull' || viewId === 'view-gacha-result') {
        bottomNav.style.display = 'none';
      } else {
        bottomNav.style.display = 'flex';
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      if (tab === 'gacha') switchView('view-gacha');
      else if (tab === 'pokedex') {
        switchView('view-pokedex');
        renderCards(allCards, 'pokedex-container', true);
      }
    }

    function initGachaList() {
      const container = document.getElementById('gacha-banners');
      container.innerHTML = '';
      gachaData.forEach(gacha => {
        const banner = document.createElement('div');
        banner.className = 'gacha-banner';
        // パス修正＆テキストを削除して画像だけを見せる
        banner.style.backgroundImage = `url('./public/image/gacha/${gacha.image}')`;
        banner.onclick = () => {
          currentGacha = gacha;
          document.getElementById('pull-banner-preview').style.backgroundImage = banner.style.backgroundImage;
          switchView('view-gacha-pull');
        };
        container.appendChild(banner);
      });
    }

    function confirmGacha(times) {
      pendingGachaTimes = times;
      document.getElementById('confirm-text').innerText = `${times}回 ガチャを引きますか？`;
      document.getElementById('confirm-modal-overlay').style.display = 'flex';
    }
    function closeConfirmModal() { document.getElementById('confirm-modal-overlay').style.display = 'none'; }
    function proceedGacha() { closeConfirmModal(); executeGacha(pendingGachaTimes); }

    function executeGacha(times) {
      const pool = allCards.filter(c => currentGacha.genres.includes(c.genre));
      if (pool.length === 0) return alert('このガチャに排出されるカードがありません');

      const results = [];
      for (let i = 0; i < times; i++) {
        const rand = Math.random() * 100;
        let targetRarity = 1;
        if (rand < 2) targetRarity = 5;
        else if (rand < 10) targetRarity = 4;
        else if (rand < 30) targetRarity = 3;
        else if (rand < 60) targetRarity = 2;

        const rarityPool = pool.filter(c => c.rarity === targetRarity);
        const finalPool = rarityPool.length > 0 ? rarityPool : pool; 
        const pulledCard = finalPool[Math.floor(Math.random() * finalPool.length)];
        
        results.push(pulledCard);
        ownedCardIds.add(pulledCard.id);
      }
      renderCards(results, 'gacha-result-container', false);
      switchView('view-gacha-result');
    }

    function renderCards(cardsArray, containerId, isPokedexMode = false) {
      const container = document.getElementById(containerId);
      container.innerHTML = ''; 
      let revealedCount = 0;
      const totalCards = isPokedexMode ? 0 : cardsArray.length;
      const btnContainer = document.getElementById('result-action-buttons');
      
      if (btnContainer && !isPokedexMode) {
        btnContainer.style.opacity = '0.3';
        btnContainer.style.pointerEvents = 'none';
      }

      cardsArray.forEach(card => {
        const isOwned = ownedCardIds.has(card.id);
        const wrapperEl = document.createElement('div');
        wrapperEl.className = 'card-wrapper';

        const imgEl = document.createElement('div');
        imgEl.className = 'card-image';
        imgEl.style.backgroundImage = `url('${card.imageUrl}')`;
        const positionX = (card.rarity - 1) * 25;
        imgEl.style.backgroundPosition = `${positionX}% 0%`;

        const overlayEl = document.createElement('div');
        overlayEl.className = 'card-overlay';
        imgEl.appendChild(overlayEl);

        let diamondColorClass = 'diamond-silver';
        if (card.rarity === 4) diamondColorClass = 'diamond-gold';
        if (card.rarity === 5) diamondColorClass = 'diamond-rainbow';

        const diamondsEl = document.createElement('div');
        diamondsEl.className = 'rarity-diamonds';
        for (let i = 0; i < card.rarity; i++) {
          const diamond = document.createElement('div');
          diamond.className = `diamond ${diamondColorClass}`;
          diamondsEl.appendChild(diamond);
        }

        const attrEl = document.createElement('div');
        attrEl.className = `attr-badge attr-${card.attribute}`;

        if (isPokedexMode) {
          if (!isOwned) wrapperEl.classList.add('is-unowned');
          else {
             if (card.rarity === 5) wrapperEl.classList.add('is-star5');
             if (card.rarity === 4) wrapperEl.classList.add('is-star4');
          }
          wrapperEl.appendChild(imgEl); wrapperEl.appendChild(diamondsEl); wrapperEl.appendChild(attrEl);
          if (!isOwned) wrapperEl.onclick = null;
          else wrapperEl.onclick = () => openModal(card, positionX);
        } else {
          wrapperEl.classList.add('in-gacha');
          if (card.rarity === 5) wrapperEl.classList.add('is-star5', 'flip-star5');
          else if (card.rarity === 4) wrapperEl.classList.add('is-star4', 'flip-star4');
          else wrapperEl.classList.add('flip-star-normal');

          let initialBackRarity = card.rarity;
          if (card.rarity >= 4 && Math.random() < 0.30) { wrapperEl.classList.add('is-fakeout'); initialBackRarity = 3; }

          const innerEl = document.createElement('div'); innerEl.className = 'card-inner';
          const frontEl = document.createElement('div'); frontEl.className = 'card-front';
          const backEl = document.createElement('div'); backEl.className = 'card-back';

          if (initialBackRarity === 5) backEl.classList.add('back-star5');
          else if (initialBackRarity === 4) backEl.classList.add('back-star4');

          frontEl.appendChild(imgEl); frontEl.appendChild(diamondsEl); frontEl.appendChild(attrEl);
          innerEl.appendChild(backEl); innerEl.appendChild(frontEl); wrapperEl.appendChild(innerEl);

          let isRevealed = false;
          wrapperEl.onclick = () => {
            if (!isRevealed) {
              wrapperEl.classList.add('is-flipped'); isRevealed = true; revealedCount++;
              if (revealedCount === totalCards && btnContainer) {
                const delay = wrapperEl.classList.contains('is-fakeout') ? 2000 : 1500;
                setTimeout(() => { btnContainer.style.opacity = '1'; btnContainer.style.pointerEvents = 'auto'; }, delay);
              }
            } else { openModal(card, positionX); }
          };
        }
        container.appendChild(wrapperEl);
      });
    }

    function openModal(card, positionX) {
      const modalWrapper = document.getElementById('modal-image-wrapper');
      modalWrapper.className = ''; 
      if (card.rarity === 5) modalWrapper.classList.add('is-star5');
      if (card.rarity === 4) modalWrapper.classList.add('is-star4');

      const imageBox = document.getElementById('modal-image-box');
      imageBox.style.backgroundImage = `url('${card.imageUrl}')`;
      imageBox.style.backgroundPosition = `${positionX}% 0%`; 
      
      document.getElementById('modal-name').innerText = card.name;
      document.getElementById('modal-info').innerText = `★${card.rarity} / 属性: ${card.attribute} / ${card.genre}`;
      document.getElementById('modal-overlay').style.display = 'flex';
    }
    
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    // =========================================
    // 画像プリロード処理
    // =========================================
    function preloadImagesAndInit() {
      const imageUrlsToLoad = new Set();
      
      // ガチャバナー画像のURLをセットに追加
      gachaData.forEach(g => imageUrlsToLoad.add(`./public/image/gacha/${g.image}`));
      // カード画像のURLをセットに追加
      allCards.forEach(c => imageUrlsToLoad.add(c.imageUrl));

      const totalImages = imageUrlsToLoad.size;
      let loadedCount = 0;

      if (totalImages === 0) {
        finishLoading();
        return;
      }

      imageUrlsToLoad.forEach(url => {
        const img = new Image();
        img.onload = () => handleImageLoad();
        img.onerror = () => handleImageLoad(); // エラー時もカウントを進める（止まらないように）
        img.src = url;
      });

      function handleImageLoad() {
        loadedCount++;
        const percent = Math.floor((loadedCount / totalImages) * 100);
        document.getElementById('loading-bar').style.width = percent + '%';

        if (loadedCount === totalImages) {
          // ロード完了後、少しだけ間を置いて画面を消す（プログレスバーが100%になるのを見せるため）
          setTimeout(finishLoading, 500);
        }
      }
    }

    function finishLoading() {
      document.getElementById('loading-screen').style.display = 'none';
      initGachaList();
    }

    // アプリ起動時にプリロードを開始
    window.onload = preloadImagesAndInit;

  </script>
</body>
</html>
