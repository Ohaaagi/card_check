<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カード表示テスト</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #222; /* ガチャ画面っぽい暗めの背景 */
      margin: 0;
      padding: 10px;
    }
    h2 {
      color: #fff;
      text-align: center;
    }
    
    /* スマホ画面に合わせてカードを綺麗に並べるグリッド */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      justify-items: center;
    }

    /* ★カードの見た目と切り出し設定★ */
    .card {
      width: 100px;
      height: 100px;
      background-size: 500% 100%; /* 画像の横幅を5倍として扱う */
      border: 3px solid #ccc;
      border-radius: 8px;
      position: relative;
      background-color: #555; /* 画像がない時の仮の背景色 */
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }

    /* レアリティの表示 */
    .rarity {
      position: absolute;
      top: 0;
      left: 0;
      background: rgba(255, 215, 0, 0.9);
      color: #000;
      font-size: 12px;
      padding: 2px 6px;
      font-weight: bold;
      border-bottom-right-radius: 6px;
    }

    /* キャラクター名の表示 */
    .card-info {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 10px;
      text-align: center;
      padding: 4px 0;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <h2>カード一覧 (全45枚)</h2>
  <div id="card-container" class="container"></div>

  <script>
    // 1. コピペしていただいたデータをそのまま文字列として用意
    const rawData = `
001.png 黄 コンサート ニコニコ・ニコリ
002.png 紫 コンサート 白髪G
003.png 桃 コンサート デブG
004.png 紫 日常 ニコニコ・ニコリ
005.png 桃 日常 白髪G
006.png 黄 日常 デブG
007.png 桃 花見 ニコニコ・ニコリ
008.png 桃 花見 白髪G
009.png 桃 花見 デブG
    `;

    // 2. カードを定義するクラス
    class Card {
      constructor(id, rarity, genre, name, attribute, imageUrl) {
        this.id = id;
        this.rarity = rarity;
        this.genre = genre;
        this.name = name;
        this.attribute = attribute;
        this.imageUrl = imageUrl;
      }
    }

    const allCards = [];

    // 3. 文字列データを1行ずつ処理して配列に変換（データ整形）
    // 改行で分割して配列にする
    const lines = rawData.trim().split('\n');
    
    lines.forEach(line => {
      // 空白で分割して各項目を取得
      const parts = line.trim().split(/\s+/);
      if (parts.length >= 4) {
        const fileName = parts[0];
        const attribute = parts[1];
        const genre = parts[2];
        const name = parts[3];
        
        const baseId = fileName.split('.')[0]; // "001" を取り出す
        const imageUrl = `./public/image/card/${fileName}`;

        // 1つの画像データから、☆1〜☆5のカードを5枚生成する
        for (let rarity = 1; rarity <= 5; rarity++) {
          allCards.push(new Card(`${baseId}-${rarity}`, rarity, genre, name, attribute, imageUrl));
        }
      }
    });

    // 4. HTMLにカードを描画する処理
    const container = document.getElementById('card-container');

    allCards.forEach(card => {
      // カードのHTML要素を作成
      const cardEl = document.createElement('div');
      cardEl.className = 'card';
      
      // 画像パスをセット
      cardEl.style.backgroundImage = `url('${card.imageUrl}')`;
      
      // ★画像の切り出し位置を計算（横5枚並び）
      // ☆1なら0%, ☆2なら25%, ☆3なら50%...とズラす
      const positionX = (card.rarity - 1) * 25;
      cardEl.style.backgroundPosition = `${positionX}% 0%`;
      
      // 属性によってカードの枠の色を変える（遊び心です）
      if (card.attribute === '黄') cardEl.style.borderColor = '#FFD700'; // ゴールド
      if (card.attribute === '桃') cardEl.style.borderColor = '#FF69B4'; // ピンク
      if (card.attribute === '紫') cardEl.style.borderColor = '#9370DB'; // パープル

      // htmlの中身（レアリティと名前）をセット
      cardEl.innerHTML = `
        <div class="rarity">☆${card.rarity}</div>
        <div class="card-info">${card.name}</div>
      `;
      
      // 画面に追加
      container.appendChild(cardEl);
    });
  </script>
</body>
</html>
