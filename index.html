<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カード一覧</title>
  <style>
    /* 全体：より深く、洗練されたダークトーン */
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background-color: #0d1117; 
      margin: 0;
      padding: 20px 15px;
    }
    h2 {
      color: #e2e8f0;
      text-align: center;
      font-weight: 300; /* 細字にしてモダンな印象に */
      letter-spacing: 2px;
      margin-bottom: 25px;
    }
    
    .container {
      display: grid;
      /* スマホ幅に合わせて自動調整しつつ、少し大きめに表示 */
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 20px;
      justify-items: center;
    }

    /* ★ 外枠（グラデーションの細いラインとして機能させる） */
    .card-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1; /* 完全な正方形を維持 */
      border-radius: 12px;
      padding: 2px; /* この2pxが「細くて美しい枠線」になります */
      box-shadow: 0 8px 16px rgba(0,0,0,0.4);
    }

    /* ★ 内側の画像部分 */
    .card-image {
      width: 100%;
      height: 100%;
      border-radius: 10px; /* 外枠より少し小さく角丸に */
      background-size: 500% 100%;
      position: relative;
      overflow: hidden; /* はみ出しをカット */
    }

    /* 画像の下部に「黒のグラデーション」を敷いて、星を際立たせる */
    .card-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 45%;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ＝＝＝ スタイリッシュな枠線の色（グラデーション） ＝＝＝ */
    .frame-1 { background: linear-gradient(135deg, #78716c, #44403c); } /* ブロンズ */
    .frame-2 { background: linear-gradient(135deg, #cbd5e1, #64748b); } /* シルバー */
    .frame-3 { background: linear-gradient(135deg, #fef08a, #eab308); } /* ゴールド */
    /* ☆4と☆5は少し光らせる */
    .frame-4 { 
      background: linear-gradient(135deg, #fbcfe8, #db2777); 
      box-shadow: 0 4px 15px rgba(219, 39, 119, 0.4);
    }
    .frame-5 {
      background: linear-gradient(135deg, #c084fc, #ec4899, #facc15);
      background-size: 200% 200%;
      animation: mysticGlow 3s ease infinite; /* ゆっくりと色が移り変わる上品なアニメーション */
      box-shadow: 0 4px 20px rgba(236, 72, 153, 0.5);
    }
    @keyframes mysticGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ＝＝＝ 左下：レアリティの星（文字ではなく記号で表現） ＝＝＝ */
    .stars {
      position: absolute;
      bottom: 6px;
      left: 8px;
      color: #fbbf24;
      font-size: 13px;
      letter-spacing: 2px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
      z-index: 2;
    }

    /* ＝＝＝ 右上：属性バッジ（フラットでスマートな円形） ＝＝＝ */
    .attr-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 2px 6px rgba(0,0,0,0.6);
      font-size: 11px;
      line-height: 18px; /* 文字を上下中央に */
      text-align: center;
      font-weight: bold;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      z-index: 10;
    }
    /* グラデーションで上品な色合いに */
    .attr-黄 { background: linear-gradient(135deg, #fbbf24, #d97706); }
    .attr-桃 { background: linear-gradient(135deg, #f472b6, #be185d); }
    .attr-紫 { background: linear-gradient(135deg, #c084fc, #7e22ce); }

  </style>
</head>
<body>

  <h2>CARD COLLECTION</h2>
  <div id="card-container" class="container"></div>

  <script>
    const rawData = `
001.png 黄 コンサート ニコニコ・ニコリ
002.png 紫 コンサート 白髪G
003.png 桃 コンサート デブG
004.png 紫 日常 ニコニコ・ニコリ
005.png 桃 日常 白髪G
006.png 黄 日常 デブG
007.png 桃 花見 ニコニコ・ニコリ
008.png 桃 花見 白髪G
009.png 桃 花見 デブG
    `;

    class Card {
      constructor(id, rarity, genre, name, attribute, imageUrl) {
        this.id = id;
        this.rarity = rarity;
        this.genre = genre;
        this.name = name;
        this.attribute = attribute;
        this.imageUrl = imageUrl;
      }
    }

    const allCards = [];
    const lines = rawData.trim().split('\n');
    
    lines.forEach(line => {
      const parts = line.trim().split(/\s+/);
      if (parts.length >= 4) {
        const fileName = parts[0];
        const attribute = parts[1];
        const genre = parts[2];
        const name = parts[3];
        
        const baseId = fileName.split('.')[0];
        const imageUrl = `./public/image/card/${fileName}`;

        for (let rarity = 1; rarity <= 5; rarity++) {
          allCards.push(new Card(`${baseId}-${rarity}`, rarity, genre, name, attribute, imageUrl));
        }
      }
    });

    const container = document.getElementById('card-container');

    allCards.forEach(card => {
      // 1. 大枠（ここで極細のグラデーション枠線を表現）
      const wrapperEl = document.createElement('div');
      wrapperEl.className = `card-wrapper frame-${card.rarity}`;
      
      // 2. 内側の画像
      const imgEl = document.createElement('div');
      imgEl.className = 'card-image';
      imgEl.style.backgroundImage = `url('${card.imageUrl}')`;
      const positionX = (card.rarity - 1) * 25;
      imgEl.style.backgroundPosition = `${positionX}% 0%`;

      // 3. 画像下部のシャドウ（星を見やすくするため）
      const overlayEl = document.createElement('div');
      overlayEl.className = 'card-overlay';
      imgEl.appendChild(overlayEl);

      // 4. 星（レアリティの数だけ★を繰り返す）
      const starsEl = document.createElement('div');
      starsEl.className = 'stars';
      starsEl.innerText = '★'.repeat(card.rarity); // 例：☆3なら「★★★」になる

      // 5. 右上の属性バッジ（漢字1文字）
      const attrEl = document.createElement('div');
      attrEl.className = `attr-badge attr-${card.attribute}`;
      attrEl.innerText = card.attribute;

      // 要素を合体させて画面に追加
      wrapperEl.appendChild(imgEl);
      wrapperEl.appendChild(starsEl);
      wrapperEl.appendChild(attrEl);
      container.appendChild(wrapperEl);
    });
  </script>
</body>
</html>
